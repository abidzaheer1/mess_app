<style>
        body {
            background-color: #F8FAFC;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card-shadow {
            box-shadow: 0px 4px 12px rgba(30, 64, 175, 0.05);
        }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-md">
<!-- Top Navigation Bar (Simplified for Auth Flow) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-center items-center px-md py-sm bg-surface shadow-sm">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-headline-md" data-icon="corporate_fare">corporate_fare</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Alpha Mess</h1>
</div>
</header>
<main class="w-full max-w-md mt-xl">
<!-- Bento Grid Styled Container -->
<div class="bg-surface-container-lowest login-card-shadow rounded-xl p-xl border border-outline-variant flex flex-col gap-lg">
<!-- Header Section -->
<div class="text-center space-y-xs">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Log in to manage your mess logistics and finances.</p>
</div>
<!-- Login Illustration/Visual Anchor -->
<div class="w-full h-32 rounded-lg overflow-hidden bg-primary-fixed relative">
<img alt="Institutional workspace" class="w-full h-full object-cover opacity-60 mix-blend-multiply" data-alt="A clean and professional office workspace with architectural blueprints and a digital tablet on a wooden desk. The scene is bathed in soft, natural morning light coming through a large window, creating a high-key, modern corporate modernist aesthetic. The color palette is dominated by corporate blues and crisp whites, reflecting a mood of organized efficiency and institutional trust." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBTUH6RYdwspHLCogzvFbUyWenFrFqJvC5mqwg_8_PX_OY1D3heXKXQB1dUjR3UcTDCwq4VmfPrdR7ZWMHjwRyVOe95uD4TEOxJ8Qw6fXggvopGgFDQ_butN0OYGLWWd52zcMSoFV_Sg7Y5Z58Uh9-XjnUW0dFuioRz7iLfUsOsFI3zaybFkoctugiMarR2VJH25D4R-LjqicCIyN9zvp0YFoPcD9eguqI5IStzhIg_yBWD8nBya-Q7vJ7HjuJzTU3-6ZGeE-sIQBZO"/>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[48px]" data-icon="lock_open">lock_open</span>
</div>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full pl-[48px] pr-md py-sm rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary bg-surface outline-none transition-all font-body-md text-body-md" id="email" placeholder="john.doe@alphamess.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="key">key</span>
<input class="w-full pl-[48px] pr-md py-sm rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary bg-surface outline-none transition-all font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-sm">
<button class="w-full py-md bg-primary text-on-primary rounded-lg font-label-lg text-label-lg shadow-sm hover:shadow-md active:scale-[0.98] transition-all flex justify-center items-center gap-sm" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Bottom Separator -->
<div class="flex items-center gap-sm">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline">OR</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<!-- Sign Up Prompt -->
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-semibold hover:underline" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Trust Badges / Footer -->
<div class="mt-xl grid grid-cols-2 gap-md">
<div class="flex items-center gap-sm p-sm bg-surface-container-low rounded-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-secondary" data-icon="verified_user">verified_user</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Secure AES-256</span>
</div>
<div class="flex items-center gap-sm p-sm bg-surface-container-low rounded-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-tertiary-container" data-icon="cloud_done">cloud_done</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Cloud Backup</span>
</div>
</div>
</main>
<!-- Support Link -->
<footer class="mt-xl mb-md">
<p class="font-label-sm text-label-sm text-outline">
            © 2024 Alpha Mess Management System. Built for teams.
        </p>
</footer>
</body></html>
