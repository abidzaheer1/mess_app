<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Alpha Mess — mess management for your home. Expenses, chat, and grocery duty.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Alpha Mess">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Alpha Mess</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #00288E;
    }

    #app-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: linear-gradient(165deg, #00288E 0%, #1E40AF 55%, #006C49 100%);
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    #app-loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-mark {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.22);
    }

    .splash-title {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .splash-subtitle {
      font-size: 0.95rem;
      opacity: 0.88;
      margin-top: -8px;
    }

    .splash-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app-loading" aria-live="polite" aria-busy="true">
    <div class="splash-mark" aria-hidden="true">α</div>
    <div class="splash-title">Alpha Mess</div>
    <div class="splash-subtitle">Loading your mess…</div>
    <div class="splash-spinner" role="progressbar" aria-label="Loading"></div>
  </div>

  <script>
    function hideSplash() {
      var el = document.getElementById('app-loading');
      if (!el || el.classList.contains('hidden')) return;
      el.classList.add('hidden');
      el.setAttribute('aria-busy', 'false');
      setTimeout(function () { el.remove(); }, 400);
    }

    window.addEventListener('flutter-first-frame', hideSplash);
    // Fallback if first-frame event is missed on slow networks
    setTimeout(hideSplash, 45000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
